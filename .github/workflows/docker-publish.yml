# Se le da un nombre el fujo de trabajo
name: Docker
# On configura cuando se ejecuta el fujo
# se programa para que se ejecute de madrugada y cuando se hacen push y pull a la rama master
on:
    schedule:
        - cron: "29 9 * * *"
    push:
        branches: ["master"]
        tags: ["v*.*.*"]
    pull_request:
        branches: ["master"]
#variables
env:
    REGISTRY: docker.io
    IMAGE_NAME: xavimagine/proyecto-aws

jobs:
    test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test # Aquí se ejecutan tus tests
    #este build crea un repositorio con la imagen  dandole el nombre que se puseo en env
    build:
        #Solo se ejecuta si testsale bien
        needs: test 
        runs-on: ubuntu-latest
        # Github usara un ordenador ubunto para hacer el build y hay que darle los permisos
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write
        # son los paso que debe realizar cada jobs que se ejecuta
        steps:
            #copia el codigo del repositorio al servidor de gitub
            - name: Checkout repository
              uses: actions/checkout@v4
            #instala una dependencia para poder crear la imagen
            - name: Install cosign
              if: github.event_name != 'pull_request'
              uses: sigstore/cosign-installer@v3.5.0
            #levanta el constructuro de la imagen
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3.0.0
            #Busca los secretos guardados en github  para identificar el docker hub donde subirla
            - name: Log into registry ${{ env.REGISTRY }}
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}
            #Genera etiquetas automaticas
            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.IMAGE_NAME }}
            #Construye la imagen usando dockerfile y la sube al repositorio
            - name: Build and push Docker image
              id: build-and-push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
            #Termina de generar la imagen y garantiza que no lleve codigo malicioso
            - name: Sign the published Docker image
              if: github.event_name != 'pull_request'
              env:
                  TAGS: ${{ steps.meta.outputs.tags }}
                  DIGEST: ${{ steps.build-and-push.outputs.digest }}
              run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
    test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # O la versión que uses
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test # Aquí se ejecutan tus tests (Jest, Mocha, etc.)

  # --- TRABAJO 2: CONSTRUCCIÓN (Tu código actual) ---
  build:
    needs: test # <--- CRÍTICO: Solo empieza si 'test' sale bien
    runs-on: ubuntu-latest